<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/contactstyle.css">
</head>
<body>

    <div id="preloader">
        <div class="loader">🚀</div>
    </div>

    <header>
        <div class="logo">
            <div class="logo-dot"></div>

        </div>
        <div class="menu-toggle" id="menu-toggle">

        </div>
        <nav id="main-nav">

            <a href="../lvb2.html">Projects</a>

            <a href="../index.html">Home</a> </nav>

    <main>
        <div class="contact-info">
            <h1>Contact</h1>
            <p>Looking forward to hearing from you!</p>
            <p><strong>Phone:</strong><br>+963 945 555 925</p>
            <p><strong>Email:</strong><br>Ayhamalmazyad@gmail.com</p>
        </div>

        <form class="contact-form" id="contactForm">
            <input type="text" name="firstName" placeholder="First Name *" required />
            <input type="text" name="lastName" placeholder="Last Name *" required />
            <input type="email" name="email" placeholder="Email *" required />
            <input type="text" name="subject" placeholder="Subject" />
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit" class="submit-btn">Submit</button>
            <div id="status-message"></div>
        </form>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-section">
                <strong>Phone</strong>
                <p>+963 945 555 925</p>
            </div>
            <div class="footer-section">
                <strong>Email</strong>
                <p>Ayhamalmazyad@gmail.com</p>
            </div>
            <div class="footer-section">
                <strong>Follow Me</strong>
               <div class="social-icons">
                    <a href="https://www.facebook.com/ayham.mziad" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://github.com/Aeham-sys" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="https://www.instagram.com/ayhambmz/profilecard/?igsh=MWZ1MnQzeTI5YWZlNA==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/in/ayham-al-mziad?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
           <div style="margin-top: 40px; text-align: center; font-size: 14px; color: #777;">
      © 2025 By Ayham AlMazyad.  
    </div>
        </div>
    </footer>

    <button id="backToTop">↑</button>

    <script>
        // Preloader Logic
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) { // Check if preloader exists before manipulating
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.display = 'none'; }, 400);
            }
        });

        // Hamburger Menu Toggle Logic
        const menuToggle = document.getElementById('menu-toggle');
        const mainNav = document.getElementById('main-nav');
        if (menuToggle && mainNav) {
            menuToggle.addEventListener('click', () => {
                mainNav.classList.toggle('active');
            });
        }

        // Footer Section Fade-in (using Intersection Observer)
        const footerObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    footerObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.1 // Trigger when 10% of the element is visible
        });
        document.querySelectorAll('.footer-section').forEach(section => {
            footerObserver.observe(section);
        });

        // Back to Top Button Logic
        const backToTop = document.getElementById('backToTop');
        if (backToTop) { // Check if button exists
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTop.style.display = 'block';
                } else {
                    backToTop.style.display = 'none';
                }
            });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }


        // Contact Form Submission Logic (Interacts with send.php)
        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('status-message'); // Get status div once

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            const data = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                email: formData.get('email'),
                subject: formData.get('subject'),
                message: formData.get('message')
            };

            showStatus('Sending message...', ''); // Show sending status

            try {
                const res = await fetch('send.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Check if the response is OK (status 200-299)
                if (res.ok) {
                    const responseText = await res.text();
                    showStatus(`✅ ${responseText}`, 'success'); // Use response from send.php
                    form.reset(); // Clear the form on success
                } else {
                    // Handle non-OK responses (e.g., 400, 500 errors from send.php)
                    const errorText = await res.text(); // Get error message from backend if available
                    console.error('Backend Error:', res.status, errorText);
                    showStatus(`❌ Error: ${errorText || 'Failed to send message.'}`, 'error');
                }
            } catch (err) {
                console.error('Fetch Error:', err);
                showStatus('⚠️ Message failed to send. Please check your network connection.', 'error');
            }
        });

        // Helper function to display status messages
        function showStatus(msg, cls) {
            statusDiv.textContent = msg;
            statusDiv.className = cls; // Apply 'success' or 'error' class for styling
            statusDiv.style.display = 'block';
            // Hide message after 7 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 7000);
        }
    </script>
</body>
</html>
